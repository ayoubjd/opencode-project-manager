appId: com.project-manager.app
productName: Project Manager
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: resources

files:
  - electron/**/*
  - package.json

# Ship the built app + production dependencies into the app resources
# so Electron's main process can run `next start` from there.
extraResources:
  - from: .
    to: .
    filter:
      - ".next/**/*"
      - "node_modules/**/*"
      - "public/**/*"
      - "prisma/**/*"
      - "package.json"
      - "next.config.ts"
      - "dev.db"
      - "*.json"
      - "!src/**/*"
      - "!electron/**/*"
      - "!scripts/**/*"
      - "!.github/**/*"
      - "!.git/**/*"
      - "!dist-electron/**/*"
      - "!node_modules/.cache/**/*"
      - "!**/*.map"
      - "!**/*.d.ts.map"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

npmRebuild: true
asar: false
