appId: com.project-manager.app
productName: Project Manager
copyright: Copyright © 2026

directories:
  output: dist-electron

# Everything lives in resources/app/ so next start can find
# .next/, node_modules/, prisma/, etc. relative to its cwd.
# electron-builder automatically prunes devDependencies.
files:
  - "**/*"
  - "!src/**/*"
  - "!scripts/**/*"
  - "!.github/**/*"
  - "!.git/**/*"
  - "!dist-electron/**/*"
  - "!electron-builder.yml"
  - "!node_modules/.cache/**/*"
  - "!**/*.map"
  - "!**/*.d.ts.map"
  - "!**/*.md"
  - "!tsconfig.json"
  - "!eslint.config.mjs"
  - "!postcss.config.mjs"
  - "!prisma.config.ts"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

npmRebuild: true
asar: false
